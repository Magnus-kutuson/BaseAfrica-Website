<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenBaseAfrica</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/assets/Main Logo.png">
  <style>
    /* ── Bootstrap Loading Screen ── */
    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0D2B4E;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .app-loader.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* Brand container */
    .app-loader__brand-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      animation: loader-pulse 2.5s ease-in-out infinite;
    }

    /* Logo mark */
    .app-loader__logo {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }
    .app-loader__logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    /* Text block */
    .app-loader__text-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Title: OPEN BASE */
    .app-loader__title {
      color: #ffffff;
      font-family: 'Cinzel', serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.1em;
      line-height: 1;
      text-shadow: 1.5px 1.5px 0px #C8960C;
      margin-bottom: 6px;
      white-space: nowrap;
    }

    /* Subtitle: - AFRICA - */
    .app-loader__subtitle {
      color: #ffffff;
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.25em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .app-loader__line {
      width: 24px;
      height: 1.5px;
      background-color: #C8960C;
    }

    /* Tagline */
    .app-loader__tagline {
      color: #8db0d3;
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 36px;
    }

    /* Progress bar track */
    .app-loader__bar-track {
      width: 180px;
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    /* Progress bar fill – animated sweep */
    .app-loader__bar-fill {
      width: 40%;
      height: 100%;
      background: #2A7A4F;
      border-radius: 3px;
      animation: loader-sweep 2.5s ease-in-out infinite;
    }

    @keyframes loader-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.6; transform: scale(0.95); }
    }

    @keyframes loader-sweep {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(150%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown until Angular bootstraps, then faded out -->
  <div class="app-loader" id="app-loader">
    <div class="app-loader__brand-container">
      <div class="app-loader__logo">
        <img src="/assets/Anchored O White.png" alt="OpenBaseAfrica Icon">
      </div>
      <div class="app-loader__text-block">
        <div class="app-loader__title">OPEN BASE</div>
        <div class="app-loader__subtitle">
          <span class="app-loader__line"></span>
          <span>AFRICA</span>
          <span class="app-loader__line"></span>
        </div>
      </div>
    </div>
    <div class="app-loader__tagline">Global Operations. African Execution.</div>
    <div class="app-loader__bar-track">
      <div class="app-loader__bar-fill"></div>
    </div>
  </div>
  <app-root></app-root>
</body>
</html>
