<app-header></app-header>

<main class="w-full min-h-[65vh] flex flex-col items-center justify-center bg-gray-50 py-20 px-6 text-center">
  <div class="bg-white p-10 md:p-14 rounded-2xl shadow-sm border border-gray-100 max-w-xl w-full">
    <div class="w-20 h-20 bg-brand-primary/10 rounded-full flex items-center justify-center mx-auto mb-8">
      <lucide-angular [img]="icons.Wrench" class="w-10 h-10 text-brand-primary"></lucide-angular>
    </div>
    
    <h1 class="text-3xl md:text-4xl font-extrabold text-brand-primary tracking-tight mb-4">
      {{ pageName }}
    </h1>
    
    <p class="text-gray-600 text-lg mb-10 leading-relaxed font-medium">
      This section of the BaseAfrica platform is currently under construction. We're working hard to bring you the full experience soon.
    </p>
    
    <a routerLink="/" class="inline-flex items-center justify-center px-8 py-3.5 bg-brand-secondary hover:bg-brand-secondary/90 text-brand-primary font-bold rounded shadow-sm transition-all duration-300 hover:scale-105">
      Return to Homepage
    </a>
  </div>
</main>

<app-footer></app-footer>
